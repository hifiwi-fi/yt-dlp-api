name: tests

on: [pull_request, push]

env:
  FORCE_COLOR: 2

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      matrix:
        os: [ubuntu-latest]
        python_version: ["3.x"]

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python_version }}
          architecture: "x64"

      - name: Install Flake8
        run: |
          pip install flake8
        working-directory: ytdlp-server

      - name: Run Flake8
        run: |
          flake8 . --max-line-length=120
        working-directory: ytdlp-server

      - name: Install Protoc using apt-get
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Verify protoc installation
        run: protoc --version

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: package.json
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  automerge:
    needs: test
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.head_ref, 'dependabot/github_actions/actions/') ||
      startsWith(github.head_ref, 'dependabot/github_actions/github/codeql-action'))
    runs-on: ubuntu-latest
    permissions:
      contents: write # Merge the tested Dependabot PR and delete its branch.
      pull-requests: write # Merge the tested Dependabot PR.
    steps:
      - name: Merge first-party GitHub Actions Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --delete-branch
