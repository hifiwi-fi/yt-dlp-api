name: npm bump

on:
  workflow_dispatch:
    inputs:
      new-version:
        description: "Calver version (YYYY.MM.DD). Defaults to today's date."
        required: false
      skip-tests:
        description: "Skip the test step (tests hit YouTube and fail in CI due to IP bans)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_COLOR: 1
  NPM_CONFIG_COLOR: always
  python_version: "3.x"

concurrency:
  group: npm-bump
  cancel-in-progress: true

jobs:
  version_and_release:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Install Protoc using apt-get
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Verify protoc installation
        run: protoc --version
      - run: pnpm install
      - name: Archive lockfile
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-lock.yaml
          path: pnpm-lock.yaml
          archive: false
      - name: Test (non-blocking)
        if: ${{ !inputs.skip-tests }}
        run: pnpm test
        continue-on-error: true
      - name: Set NEW_VERSION
        run: |
          if [ -z "${{ github.event.inputs['new-version'] }}" ]; then
            echo "NEW_VERSION=$(date -d "${{ github.event.repository.pushed_at }}" +%Y.%-m.%-d)" >> $GITHUB_ENV
          else
            echo "NEW_VERSION=${{ github.event.inputs['new-version'] }}" >> $GITHUB_ENV
          fi
          echo $NEW_VERSION
      - uses: bcomnes/npm-bump@v3
        with:
          git-email: bcomnes@gmail.com
          git-username: ${{ github.actor }}
          new-version: ${{ env.NEW_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          publish-cmd: pnpm run release
      - run: pnpm run deploy -- --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
