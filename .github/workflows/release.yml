name: npm bump

on:
  workflow_dispatch:
    inputs:
      new-version:
        description: "Calver version (YYYY.MM.DD). Defaults to today's date."
        required: false
      skip-tests:
        description: "Skip the test step (tests hit YouTube and fail in CI due to IP bans)"
        type: boolean
        default: false

permissions: {}

env:
  FORCE_COLOR: 1
  NPM_CONFIG_COLOR: always
  python_version: "3.x"

concurrency:
  group: npm-bump
  cancel-in-progress: true

jobs:
  version_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push the release commit and tag and create the GitHub release.

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7
        with:
          # Keep the credential because npm-bump pushes the release commit and tag.
          persist-credentials: true
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: package.json
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master
      - name: Install Protoc using apt-get
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Verify protoc installation
        run: protoc --version
      - run: pnpm install --frozen-lockfile
      - name: Archive lockfile
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-lock.yaml
          path: pnpm-lock.yaml
          archive: false
      - name: Test (non-blocking)
        if: ${{ !inputs.skip-tests }}
        run: pnpm test
        continue-on-error: true
      - name: Set NEW_VERSION
        env:
          INPUT_NEW_VERSION: ${{ inputs.new-version }}
          REPOSITORY_PUSHED_AT: ${{ github.event.repository.pushed_at }}
        run: |
          if [ -n "$INPUT_NEW_VERSION" ]; then
            if [[ ! $INPUT_NEW_VERSION =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
              echo "new-version must use YYYY.M.D format" >&2
              exit 1
            fi
            new_version=$INPUT_NEW_VERSION
          else
            new_version=$(date -d "$REPOSITORY_PUSHED_AT" +%Y.%-m.%-d)
          fi

          printf 'NEW_VERSION=%s\n' "$new_version" >> "$GITHUB_ENV"
          printf 'NEW_VERSION=%s\n' "$new_version"
      - uses: bcomnes/npm-bump@8e67058c250579782ed12d6e591c8d07b7b0cae4 # v3
        with:
          git-email: bcomnes@gmail.com
          git-username: ${{ github.actor }}
          new-version: ${{ env.NEW_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          publish-cmd: pnpm run release
      - run: pnpm run deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
